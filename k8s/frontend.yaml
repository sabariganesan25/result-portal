apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurcc-frontend
  namespace: default
  labels:
    app: aurcc-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aurcc-frontend
  template:
    metadata:
      labels:
        app: aurcc-frontend
    spec:
      containers:
      - name: aurcc-frontend
        image: 295284356306.dkr.ecr.ap-south-1.amazonaws.com/aurcc-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aurcc-frontend
  namespace: default
spec:
  selector:
    app: aurcc-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
