apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: aurcc-portal-cluster
  region: ap-south-1

managedNodeGroups:
  - name: standard-nodes-v2
    instanceType: t3.small
    minSize: 1
    maxSize: 3
    desiredCapacity: 2
    volumeSize: 20
    ssh:
      allow: false
    labels:
      role: worker
    tags:
      nodegroup-role: worker
